name: Deploy Preview (GitHub Pages)

on:
  push:
    branches:
      - master
    paths:
      - "test-app/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - working-directory: test-app
        run: npm ci

      - working-directory: test-app
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: preview-pages
          path: test-app/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: preview-pages